<dialog #dialogElement class="m-auto rounded-3xl p-0 shadow-2xl border border-slate-200 bg-white w-full max-w-2xl overflow-hidden">

  <div class="relative font-sans">

    <div class="bg-slate-900 p-6 text-white flex justify-between items-center">
      <h2 class="text-xl font-semibold tracking-tight">
        Añadir nuevo producto
      </h2>

      <button (click)="close()" class="p-2 hover:bg-white/10 rounded-lg transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="p-8 space-y-6">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <div class="space-y-1">
          <label class="text-sm font-medium text-slate-700">Nombre</label>
          <input type="text" formControlName="nombre"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-slate-900 outline-none transition"
            placeholder="Ej: Smartphone Ultra">
        </div>

        <div class="space-y-1">
          <label class="text-sm font-medium text-slate-700">Categoría</label>
          <select formControlName="categoria"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-slate-900 outline-none transition">
            <option value="">Seleccionar</option>
            <option value="Electrónica">Electrónica</option>
            <option value="Accesorios">Accesorios</option>
            <option value="Audio">Audio</option>
            <option value="Otros">Otros</option>
          </select>
        </div>

        <div class="md:col-span-2 space-y-1">
          <label class="text-sm font-medium text-slate-700">Imagen URL</label>
          <input type="text" formControlName="imagen"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-slate-900 outline-none transition"
            placeholder="https://...">
        </div>

        <div class="space-y-1">
          <label class="text-sm font-medium text-slate-700">Precio</label>
          <input type="number" formControlName="precio"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-slate-900 outline-none transition">
        </div>

        <div class="space-y-1">
          <label class="text-sm font-medium text-slate-700">Precio original</label>
          <input type="number" formControlName="precio_salida"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-slate-900 outline-none transition">
        </div>

        <div class="space-y-1">
          <label class="text-sm font-medium text-slate-700">Stock</label>
          <input type="number" formControlName="stock"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-slate-900 outline-none transition">
        </div>

        <div class="md:col-span-2 space-y-1">
          <label class="text-sm font-medium text-slate-700">Descripción</label>
          <textarea formControlName="descripcion" rows="3"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-slate-900 outline-none transition resize-none">
          </textarea>
        </div>

      </div>

      <div class="flex gap-4 pt-4">

        <button type="button"
          (click)="close()"
          class="flex-1 rounded-xl border border-slate-300 px-6 py-3 text-sm font-medium text-slate-700 hover:bg-slate-100 transition">
          Cancelar
        </button>

        <button type="submit"
          [disabled]="productForm.invalid"
          class="flex-1 rounded-xl bg-slate-900 px-6 py-3 text-sm font-semibold text-white shadow-sm hover:bg-slate-800 disabled:opacity-50 transition">
          Guardar
        </button>

      </div>

    </form>

  </div>
</dialog>
