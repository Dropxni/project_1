<div class="min-h-screen bg-gray-100 px-4 py-8">
  <div class="mx-auto max-w-4xl">
    <div class="rounded-2xl bg-white p-6 shadow-lg">
      <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
        <div>
          <h1 class="text-2xl font-bold text-gray-800">Home</h1>
          <p class="mt-1 text-sm text-gray-500">
            Bienvenido a tu área privada
          </p>
        </div>

        <button
          type="button"
          (click)="onLogout()"
          class="rounded-xl bg-red-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-red-700"
        >
          Cerrar sesión
        </button>
      </div>

      <div class="mt-6 rounded-2xl border border-gray-200 bg-gray-50 p-5">
        <h2 class="text-lg font-semibold text-gray-800">Información del usuario</h2>

        <div class="mt-4 space-y-2 text-sm text-gray-700">
          <p>
            <span class="font-medium">Email:</span>
            {{ user()?.email || 'No disponible' }}
          </p>

          <p>
            <span class="font-medium">ID:</span>
            {{ user()?.id || 'No disponible' }}
          </p>

          <p>
            <span class="font-medium">Último acceso:</span>
            {{ user()?.last_sign_in_at || 'No disponible' }}
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
